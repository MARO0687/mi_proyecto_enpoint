<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock %} - Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Mi Proyecto</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"
                ><i class="bi bi-house-door me-1"></i> Inicio</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/info"
                ><i class="bi bi-info-circle me-1"></i> Info</a
              >
            </li>
            {% if session.get('token') %}
            <li class="nav-item">
              <a class="nav-link text-danger" href="/logout"
                ><i class="bi bi-box-arrow-right me-1"></i> Salir</a
              >
            </li>
            {% endif %}
            <li class="nav-item">
              <button
                id="toggleTheme"
                class="btn btn-outline-primary ms-lg-3 py-1"
              >
                <i class="bi bi-moon-stars me-1"></i>
                <span class="theme-text">Oscuro</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <footer class="text-center py-3 mt-4 shadow-sm">
      <small>&copy; 2026 - Proyecto de Miguel | Fecha: {{ server_date }}</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const toggleBtn = document.getElementById("toggleTheme");
      const body = document.body;
      const osDarkMode = window.matchMedia("(prefers-color-scheme: dark)");

      function applyTheme(theme) {
        if (theme === "dark") {
          body.classList.add("dark-mode");
          localStorage.setItem("theme", "dark");
          toggleBtn.innerHTML =
            '<i class="bi bi-sun me-1"></i> <span class="theme-text">Claro</span>';
        } else {
          body.classList.remove("dark-mode");
          localStorage.setItem("theme", "light");
          toggleBtn.innerHTML =
            '<i class="bi bi-moon-stars me-1"></i> <span class="theme-text">Oscuro</span>';
        }
      }

      // Inicialización: Prioridad LocalStorage > Preferencia SO
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        applyTheme(savedTheme);
      } else {
        applyTheme(osDarkMode.matches ? "dark" : "light");
      }

      // 2. Escuchar cambios manuales del usuario
      toggleBtn.addEventListener("click", () => {
        const newTheme = body.classList.contains("dark-mode")
          ? "light"
          : "dark";
        applyTheme(newTheme);
      });

      // 3. Escuchar cambios automáticos del sistema operativo
      osDarkMode.addEventListener("change", (e) => {
        // Solo actualizamos automáticamente si el usuario no ha fijado una preferencia manual
        if (!localStorage.getItem("theme")) {
          applyTheme(e.matches ? "dark" : "light");
        }
      });
    </script>
  </body>
</html>

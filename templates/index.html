{% extends "base.html" %} {% block title %}Inicio{% endblock %} {% block content
%}
<div class="row">
  <!-- Datos Usuario -->
  <div class="col-md-6 mb-4">
    <div class="card h-100 shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">
          <i class="bi bi-person-badge me-2"></i>Mi Perfil
        </h5>
        <p class="text-muted small">
          Consulta tu información personal de GitHub.
        </p>
        <form action="/datosUsuario" method="post">
          <div class="mb-3">
            <input
              type="text"
              name="token"
              class="form-control form-control-lg"
              placeholder="GitHub Token"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            Consultar Perfil
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Usuarios y Repositorios -->
  <div class="col-md-6 mb-4">
    <div class="card h-100 shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">
          <i class="bi bi-people me-2"></i>Organización
        </h5>
        <p class="text-muted small">
          Lista de miembros de cualquier organización.
        </p>
        <form action="/usuarios" method="post">
          <div class="mb-3">
            <label class="form-label small fw-bold"
              >Nombre de la Organización</label
            >
            <input
              type="text"
              name="org"
              class="form-control mb-2"
              placeholder="Ej: google, microsoft, iseu-desarrollo-maro"
              required
            />
            <label class="form-label small fw-bold">Tu Token</label>
            <input
              type="text"
              name="token"
              class="form-control form-control-lg"
              placeholder="GitHub Token"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            Ver Miembros
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
